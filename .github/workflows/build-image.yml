name: Build & publish container image

# Builds the GlassHaus image on every push to main and publishes it to the GitHub
# Container Registry (ghcr.io). Unraid pulls this prebuilt image — auto-updating
# the wall kiosk when you push. The image is TOKEN-FREE (HA token injected at
# runtime on Unraid), so it's safe to store in the registry.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          # lowercase owner/repo for ghcr; :latest + the commit SHA
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
