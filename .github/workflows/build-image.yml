name: Build & publish container images

# Builds two images on every push to main and publishes to ghcr.io; Unraid pulls
# them. Both are TOKEN-FREE (HA/Claude keys injected at runtime), safe in the registry.
#   - dashboard  → ghcr.io/<repo>:latest        (the GlassHaus kiosk, deploy/Dockerfile)
#   - analyzer   → ghcr.io/<repo>-analyzer:latest (the LLM insight service, analyzer/Dockerfile)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: dashboard
            file: deploy/Dockerfile
            context: .
            suffix: ""
          - name: analyzer
            file: analyzer/Dockerfile
            context: analyzer
            suffix: "-analyzer"
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}${{ matrix.suffix }}:latest
            ghcr.io/${{ github.repository }}${{ matrix.suffix }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
