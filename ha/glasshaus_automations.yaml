# =============================================================================
# GlassHaus notification automations  —  Home Assistant PACKAGE
# =============================================================================
# Install at <config>/packages/. GENERIC per-tank model: the programs container
# computes each tank's alerts and writes them to sensor.tank_N_derived (attribute
# `alerts` = list of {key, severity, label}). These automations fire off THAT —
# so they cover EVERY tank with no per-tank duplication (the old Black-only
# binary_sensor.tank_1_* automations are retired along with those sensors).
#
# Notify target: notify.mobile_app_jordans_phone (HA Companion app — the mobile_app_*
# service; NOT notify.jordans_phone which 500s on rich `data`). Deep-link URL below.
# =============================================================================

automation:
  # ---------------------------------------------------------------------------
  # GENERIC TANK ALERTS → phone. Fires when ANY tank's derived entity changes and
  # it now has a PROBLEM/WARNING alert that wasn't there before. Milestones
  # (approaching terminal) are info-only in-app, not pushed. One automation, N tanks.
  # ---------------------------------------------------------------------------
  - id: gh_notify_tank_alert
    alias: "GlassHaus • Tank alert → phone"
    mode: parallel
    triggers:
      - trigger: state
        entity_id:
          - sensor.tank_1_derived
          - sensor.tank_2_derived
          - sensor.tank_3_derived
    conditions:
      # only push when a problem/warning alert is present AND the alert set changed
      # (so we don't re-notify on every gravity tick with the same active alert)
      - condition: template
        value_template: >
          {% set now_alerts = state_attr(trigger.entity_id, 'alerts') or [] %}
          {% set now_keys = now_alerts | selectattr('severity','in',['problem','warning'])
                                       | map(attribute='key') | list %}
          {% set old_alerts = trigger.from_state.attributes.alerts if trigger.from_state else [] %}
          {% set old_keys = (old_alerts or []) | selectattr('severity','in',['problem','warning'])
                                               | map(attribute='key') | list %}
          {{ now_keys | length > 0 and now_keys != old_keys }}
    actions:
      - variables:
          tank: "{{ trigger.entity_id | regex_replace('^sensor\\.','') | regex_replace('_derived$','') }}"
          top: >
            {% set al = (state_attr(trigger.entity_id,'alerts') or [])
                        | selectattr('severity','in',['problem','warning']) | list %}
            {{ al[0] if al else none }}
      - action: notify.mobile_app_jordans_phone
        data:
          title: "{{ '🛑' if top.severity == 'problem' else '👀' }} {{ tank | replace('_',' ') | title }} — {{ top.label }}"
          message: >
            {{ tank | replace('_',' ') | title }}: {{ top.label }}.
            {% set d = state_attr(trigger.entity_id,'projectedFgReach') %}
            {% if d %}Projected FG {{ d }}.{% endif %}
          data:
            tag: "gh_alert_{{ tank }}"
            channel: GlassHaus Alerts
            importance: "{{ 'high' if top.severity == 'problem' else 'default' }}"
            notification_icon: "mdi:alert"
            clickAction: "http://192.168.50.118:8099/"

  # ---------------------------------------------------------------------------
  # LLM INSIGHTS — trigger analysis when any tank's derived alerts change; notify
  # when the analyzer writes sensor.glasshaus_insight. (Analyzer container.)
  # ---------------------------------------------------------------------------
  - id: gh_insight_trigger_on_alert
    alias: "GlassHaus • Trigger insight analysis on alert"
    mode: single
    triggers:
      - trigger: state
        entity_id:
          - sensor.tank_1_derived
          - sensor.tank_2_derived
          - sensor.tank_3_derived
    conditions:
      - condition: template
        value_template: >
          {% set al = state_attr(trigger.entity_id,'alerts') or [] %}
          {{ al | selectattr('severity','in',['problem','warning']) | list | length > 0 }}
    actions:
      - action: rest_command.glasshaus_insight_trigger
        data:
          reason: "{{ trigger.entity_id }}"
    # define rest_command.glasshaus_insight_trigger in configuration.yaml:
    #   rest_command:
    #     glasshaus_insight_trigger:
    #       url: "http://192.168.50.118:8091/trigger"
    #       method: POST
    #       content_type: "application/json"
    #       payload: '{"reason": "{{ reason }}"}'

  # ---------------------------------------------------------------------------
  # STARTUP REPOPULATE — HA-POSTed entities (sensor.glasshaus_insight, the plant
  # analysis cache) do NOT survive an HA restart; they only reappear on the next
  # container write. So after HA boots, wait for integrations + Brewfather to
  # re-sync (the programs container self-heals its sensor.tank_N_derived on its own
  # 5-min tick, but the analyzer only writes on digest/alert). Poke the analyzer so
  # the insight badge + the in-app Insights view refill within a couple minutes of a
  # reboot instead of staying blank until the next 8h digest.
  # ---------------------------------------------------------------------------
  - id: gh_insight_repopulate_on_start
    alias: "GlassHaus • Repopulate insights after HA restart"
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      # give Brewfather + the Tilt/controller integrations time to report so the
      # analyzer isn't fed a half-loaded state (that's what made a tick fail mid-boot)
      - delay: "00:02:00"
      - action: rest_command.glasshaus_insight_trigger
        data:
          reason: "ha-restart"
      # also warm the full-plant analysis cache for the in-app Insights view
      - action: rest_command.glasshaus_plant_refresh
    # define BOTH rest_commands in configuration.yaml:
    #   rest_command:
    #     glasshaus_insight_trigger:
    #       url: "http://192.168.50.118:8091/trigger"
    #       method: POST
    #       content_type: "application/json"
    #       payload: '{"reason": "{{ reason }}"}'
    #     glasshaus_plant_refresh:
    #       url: "http://192.168.50.118:8091/insights/refresh"
    #       method: POST

  - id: gh_notify_insight
    alias: "GlassHaus • Notify on new insight"
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.glasshaus_insight
    conditions:
      - condition: template
        value_template: >
          {{ trigger.to_state.state not in ['unknown','unavailable','',none]
             and trigger.from_state.state != trigger.to_state.state }}
    actions:
      - action: notify.mobile_app_jordans_phone
        data:
          title: >
            {% set sev = state_attr('sensor.glasshaus_insight','severity') %}
            {{ '🛑' if sev=='problem' else '👀' if sev=='watch' else '🍺' }} GlassHaus insight
          message: >
            {{ states('sensor.glasshaus_insight') }}
            {% set a = state_attr('sensor.glasshaus_insight','action') %}
            {% if a %} — {{ a }}{% endif %}
          data:
            tag: gh_insight
            channel: GlassHaus Insights
            importance: >
              {{ 'high' if state_attr('sensor.glasshaus_insight','severity')=='problem' else 'default' }}
            notification_icon: "mdi:brain"
            clickAction: "http://192.168.50.118:8099/"

  # ---------------------------------------------------------------------------
  # OBSERVABILITY — plant/component health → phone. The programs container writes
  # sensor.glasshaus_health each tick (infra staleness, disconnects, glycol, per-
  # tank temp-controller liveness). Notify when the CRITICAL/WARNING alert SET
  # changes, so a newly-frozen sensor or a dropped Kasa/Inkbird plug pages you —
  # the failures that used to sit silent for hours. (programs container.)
  # ---------------------------------------------------------------------------
  - id: gh_notify_health_alert
    alias: "GlassHaus • Component health → phone"
    mode: single
    triggers:
      - trigger: state
        entity_id: sensor.glasshaus_health
    conditions:
      - condition: template
        value_template: >
          {% set now_keys = (state_attr(trigger.entity_id,'alerts') or [])
                             | map(attribute='key') | list %}
          {% set old_keys = (trigger.from_state.attributes.alerts if trigger.from_state else [])
                             | default([], true) | map(attribute='key') | list %}
          {{ now_keys | length > 0 and now_keys != old_keys }}
    actions:
      - variables:
          top: "{{ (state_attr(trigger.entity_id,'alerts') or [])[0] }}"
          crit: "{{ state_attr(trigger.entity_id,'critical') | int(0) }}"
      - action: notify.mobile_app_jordans_phone
        data:
          title: "{{ '🚨' if top.severity == 'critical' else '⚠️' }} GlassHaus — {{ top.label }}"
          message: >
            {{ top.label }}: {{ top.detail }}.
            {% set n = state_attr(trigger.entity_id,'critical') | int(0)
                     + (state_attr(trigger.entity_id,'warnings') | int(0)) %}
            {% if n > 1 %}(+{{ n - 1 }} more){% endif %}
          data:
            tag: gh_health
            channel: GlassHaus Health
            importance: "{{ 'high' if top.severity == 'critical' else 'default' }}"
            notification_icon: "mdi:heart-pulse"
            clickAction: "http://192.168.50.118:8099/"

  # ---------------------------------------------------------------------------
  # CONTAINER LIVENESS — a dead programs container can't report its own death, so
  # HA watches from OUTSIDE: sensor.glasshaus_health carries a `heartbeat` attr
  # that advances every tick (5min). If it stops advancing for >15min the runner
  # is down (crash / Unraid reboot / image pull hang) → page. Uses a template that
  # compares the heartbeat attr age; trigger on a periodic time pattern.
  # ---------------------------------------------------------------------------
  - id: gh_notify_health_stale
    alias: "GlassHaus • Health heartbeat stale (programs container down) → phone"
    mode: single
    triggers:
      - trigger: time_pattern
        minutes: "/5"
    conditions:
      - condition: template
        value_template: >
          {% set hb = state_attr('sensor.glasshaus_health','heartbeat') %}
          {% if hb is none %}
            {{ states('sensor.glasshaus_health') not in ['unknown','unavailable'] }}
          {% else %}
            {{ (now() - as_datetime(hb)).total_seconds() > 900 }}
          {% endif %}
    actions:
      - action: notify.mobile_app_jordans_phone
        data:
          title: "🚨 GlassHaus — programs container silent"
          message: >
            No health heartbeat in
            {% set hb = state_attr('sensor.glasshaus_health','heartbeat') %}
            {% if hb %}{{ ((now() - as_datetime(hb)).total_seconds() / 60) | round }}m{% else %}(never seen){% endif %}.
            The programs runner may be down — tanks are uncontrolled.
          data:
            tag: gh_health_heartbeat
            channel: GlassHaus Health
            importance: high
            notification_icon: "mdi:heart-broken"
            clickAction: "http://192.168.50.118:8099/"
