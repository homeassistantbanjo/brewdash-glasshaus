# GlassHaus — optional compose (if you use the Compose Manager plugin). On stock
# Unraid you'll more likely use the Docker tab "Add Container" — see deploy/README.md.
# Pulls the PREBUILT image from ghcr (built by GitHub Actions); token injected at runtime.
services:
  glasshaus:
    container_name: glasshaus
    image: ghcr.io/homeassistantbanjo/brewdash-glasshaus:latest
    restart: unless-stopped
    ports:
      - "8099:80"                       # http://<unraid-tailscale>:8099/
    environment:
      # injected into config.js at startup — token lives ONLY here, never in git/image
      VITE_HA_URL: "${VITE_HA_URL}"
      VITE_HA_TOKEN: "${VITE_HA_TOKEN}"
