server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA: unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SAME-ORIGIN HA PROXY. The browser calls /ha/... (same origin as the app), so
    # there's NO CORS — nginx forwards server-side to Home Assistant. This is how the
    # app WRITES to HA (assign tilt/batch, set program): a direct cross-origin fetch
    # to HA:8123 fails in the browser ("failed to fetch") because HA sends no
    # Access-Control-Allow-Origin. Upstream is written at startup from $VITE_HA_URL
    # by the entrypoint into ha_upstream.conf (below), then included here.
    include /etc/nginx/ha_upstream.conf;

    # KEG SERVICE (same-origin). The keg QR stickers encode <this-host>/kegs/<id>, and the
    # SPA's Kegs/Taps board calls /api/keg* — both proxied server-side to the glasshaus-kegs
    # sidecar so there's one origin (QR scans + app share it). Upstream = the Unraid host IP
    # (same convention as the HA proxy above). $KEGS_URL overridable at build if it moves.
    location /kegs/ {
        proxy_pass http://192.168.50.118:8097/kegs/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }
    location /api/keg {
        proxy_pass http://192.168.50.118:8097/api/keg;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
    }
    location /api/taps {
        proxy_pass http://192.168.50.118:8097/api/taps;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }
    location /api/tap/ {
        proxy_pass http://192.168.50.118:8097/api/tap/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }

    # never cache config.js (it's written at startup with the live token) or the
    # HTML shell; hashed assets can cache forever.
    location = /config.js { add_header Cache-Control "no-store"; }
    location = /index.html { add_header Cache-Control "no-store"; }
    location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }
}
